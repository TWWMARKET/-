<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wild West Market Terminal</title>

<!-- FAVICON -->
<link rel="icon" type="image/png" href="favicon.png?v=2">

<style>
body {
    margin: 0;
    font-family: ui-monospace, monospace;
    background: #070a0f;
    color: #d1d5db;
}

.topbar {
    padding: 12px;
    background: #0f172a;
    border-bottom: 1px solid #1f2937;
    display: flex;
    justify-content: space-between;
}

.wrapper {
    display: flex;
    height: calc(100vh - 48px);
}

/* SIDEBAR */
.sidebar {
    width: 240px;
    background: #0b1220;
    border-right: 1px solid #1f2937;
    padding: 10px;
}

.tab {
    padding: 10px;
    margin-bottom: 6px;
    cursor: pointer;
    background: #0f172a;
    border: 1px solid #1f2937;
    font-size: 12px;
}

.active {
    border-color: #22c55e;
    color: #22c55e;
}

/* MAIN */
.main {
    flex: 1;
    padding: 12px;
    overflow: auto;
}

.search {
    width: 100%;
    padding: 10px;
    margin-bottom: 12px;
    background: #0f172a;
    border: 1px solid #1f2937;
    color: white;
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
    background: #0b1220;
}

th {
    text-align: left;
    font-size: 11px;
    color: #9ca3af;
    padding: 10px;
    border-bottom: 1px solid #1f2937;
}

td {
    padding: 10px;
    border-bottom: 1px solid #1f2937;
    font-size: 13px;
}

tr:hover {
    background: #0f172a;
}

.up { color: #22c55e; }
.down { color: #ef4444; }
.flat { color: #facc15; }

/* PREVIEW */
#preview {
    position: fixed;
    right: 20px;
    top: 80px;
    width: 260px;
    background: #0b1220;
    border: 1px solid #1f2937;
    padding: 10px;
    font-size: 12px;
    display: none;
}
</style>
</head>

<body>

<div class="topbar">
    <div>WILD WEST MARKET TERMINAL</div>
    <div>● DATABASE ACTIVE</div>
</div>

<div class="wrapper">

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="tab active" onclick="setView('auction', this)">AUCTION HOUSE</div>
    <div class="tab" onclick="setView('events', this)">EVENT ITEMS</div>
    <div class="tab" onclick="setView('about', this)">ABOUT</div>

    <div class="tab" style="color:#60a5fa;"
        onclick="window.open('https://discord.gg/dC3bkcpW5', '_blank')">
        DISCORD SERVER
    </div>
</div>

<!-- MAIN -->
<div class="main">

<input class="search" id="search" onkeyup="render()" placeholder="SEARCH ITEMS...">

<table>
<thead>
<tr>
<th>ITEM</th>
<th>TYPE</th>
<th>PRICE</th>
<th>BID</th>
<th>TREND</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

</div>

</div>

<!-- PREVIEW -->
<div id="preview"></div>

<script>

let view = "auction";

let auction = [
    { name:"Guycot Chain Pistol", type:"Gun", price:"$20,000", bid:"$7,000", trend:"up", description:"30-shot automatic chain pistol." },
    { name:"Schwarzlose Prototype Pistol", type:"Gun", price:"$60,000", bid:"$21,000", trend:"up", description:"Automatic 7-shot pistol." },
    { name:"Lancaster Pistol", type:"Gun", price:"$60,000", bid:"$21,000", trend:"flat", description:"Quad-barrel pistol." },
    { name:"Paterson Navy", type:"Revolver", price:"$80,000", bid:"$28,000", trend:"up", description:"Large 6-shot revolver." },
    { name:"Admiral's Axegonne", type:"Gun/Melee", price:"$100,000", bid:"$35,000", trend:"up", description:"Axe with single-shot caplock pistol." },
    { name:"Spitfire Revolving Sniper", type:"Sniper", price:"$120,000+", bid:"$42,000", trend:"up", description:"Burst automatic sniper rifle." },
    { name:"Jezail Musket", type:"Musket", price:"$80,000+", bid:"$28,000", trend:"up", description:"High accuracy single-shot musket." },
    { name:"Kukri Machete", type:"Melee", price:"$80,000", bid:"$28,000", trend:"up", description:"Heavy melee blade weapon." }
];

let events = [
    { name:"Cursed Lantern", type:"Tool", price:"N/A", bid:"N/A", trend:"flat", description:"Event item." }
];

let about = [
    { title:"Wild West Market Terminal", text:"A stock-style tracker for The Wild West Roblox game items." },
    { title:"Version", text:"Version 1 - Initial release." },
    { title:"Credits", text:"Made by: coleaice" },
    { 
        title:"Roblox Profile", 
        text:`<a href="https://www.roblox.com/users/1431249798/profile" target="_blank" style="color:#60a5fa; text-decoration:none;">
        https://www.roblox.com/users/1431249798/profile
        </a>`
    }
];

function setView(v, el){
    view = v;
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    el.classList.add("active");
    render();
}

function getTrend(t){
    if(t === "up") return `<span class="up">▲</span>`;
    if(t === "down") return `<span class="down">▼</span>`;
    return `<span class="flat">➜</span>`;
}

function showPreview(item){
    let box = document.getElementById("preview");
    box.style.display = "block";

    box.innerHTML = `
        <div style="font-weight:bold;margin-bottom:6px;">${item.name}</div>
        <div style="color:#9ca3af;margin-bottom:6px;">Type: ${item.type}</div>
        <div style="color:#9ca3af;margin-bottom:6px;">Price: ${item.price}</div>
        <div style="color:#9ca3af;margin-bottom:6px;">Bid: ${item.bid || "N/A"}</div>
        <div style="color:#9ca3af;">${item.description || "No description."}</div>
    `;
}

function hidePreview(){
    document.getElementById("preview").style.display = "none";
}

function render(){
    let search = document.getElementById("search").value.toUpperCase();
    let tbody = document.getElementById("table");
    tbody.innerHTML = "";

    if(view === "about"){
        about.forEach(item => {
            if(!item.title.toUpperCase().includes(search)) return;

            tbody.innerHTML += `
            <tr>
                <td colspan="5">
                    <div style="padding:10px;">
                        <div style="color:#22c55e;font-weight:bold;margin-bottom:6px;">
                            ${item.title}
                        </div>
                        <div style="color:#9ca3af;">
                            ${item.text}
                        </div>
                    </div>
                </td>
            </tr>`;
        });
        return;
    }

    let list = view === "auction" ? auction : events;

    list.forEach(item => {
        if(!item.name.toUpperCase().includes(search)) return;

        tbody.innerHTML += `
        <tr onmouseover='showPreview(${JSON.stringify(item)})'
            onmouseout='hidePreview()'>
            <td>${item.name}</td>
            <td>${item.type}</td>
            <td>${item.price}</td>
            <td>${item.bid || ""}</td>
            <td>${getTrend(item.trend)}</td>
        </tr>`;
    });
}

render();

</script>
<div id="reportModal" style="
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#0b1220;
border:1px solid #1f2937;
padding:15px;
width:320px;
z-index:999;
color:white;
">

<h3>Report Bug</h3>

<div id="reportItemName" style="color:#22c55e;margin-bottom:8px;"></div>

<textarea id="reportText" placeholder="Type the bug here..."
style="width:100%;height:100px;padding:8px;"></textarea>

<br><br>

<button onclick="sendReport()" style="background:#ef4444;color:white;border:none;padding:8px;cursor:pointer;">
Send Report
</button>

<button onclick="closeReport()" style="margin-left:5px;padding:8px;">
Cancel
</button>

</div>
</body>
</html>
