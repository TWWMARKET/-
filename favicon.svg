<?xml version="1.0" encoding="utf-8"?>
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <style>
      .rifle-barrel { fill: #2c3e50; }
      .rifle-stock { fill: #c0392b; }
      .rifle-detail { fill: #e74c3c; }
      .rifle-accent { fill: #f1c40f; }
    </style>
  </defs>
  
  <!-- Rifle barrel - LARGER -->
  <rect class="rifle-barrel" x="30" y="90" width="150" height="20" rx="10"/>
  
  <!-- Rifle stock/handle - BIGGER -->
  <path class="rifle-stock" d="M 170 90 L 230 40 L 245 65 L 200 110 Z"/>
  
  <!-- Rifle details - BIGGER -->
  <rect class="rifle-detail" x="175" y="85" width="8" height="16"/>
  <rect class="rifle-detail" x="195" y="85" width="8" height="16"/>
  <rect class="rifle-detail" x="215" y="85" width="8" height="16"/>
  
  <!-- Accent details - MORE VISIBLE -->
  <rect class="rifle-accent" x="35" y="75" width="120" height="8"/>
  <circle class="rifle-accent" cx="50" cy="100" r="6"/>
  <circle class="rifle-accent" cx="90" cy="100" r="6"/>
  <circle class="rifle-accent" cx="130" cy="100" r="6"/>
  
  <!-- Scope on top -->
  <circle class="rifle-barrel" cx="110" cy="70" r="8"/>
  <rect class="rifle-barrel" x="105" y="55" width="10" height="15"/>
</svg>