<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wild West Market Terminal</title>

<link rel="icon" type="image/png" href="favicon.png?v=2">

<style>
body {
    margin: 0;
    font-family: ui-monospace, monospace;
    background: #070a0f;
    color: #d1d5db;
}

.topbar {
    padding: 12px;
    background: #0f172a;
    border-bottom: 1px solid #1f2937;
    display: flex;
    justify-content: space-between;
}

.wrapper {
    display: flex;
    height: calc(100vh - 48px);
}

.sidebar {
    width: 240px;
    background: #0b1220;
    border-right: 1px solid #1f2937;
    padding: 10px;
}

.tab {
    padding: 10px;
    margin-bottom: 6px;
    cursor: pointer;
    background: #0f172a;
    border: 1px solid #1f2937;
    font-size: 12px;
}

.active {
    border-color: #22c55e;
    color: #22c55e;
}

.main {
    flex: 1;
    padding: 12px;
    overflow: auto;
}

.search {
    width: 100%;
    padding: 10px;
    margin-bottom: 12px;
    background: #0f172a;
    border: 1px solid #1f2937;
    color: white;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: #0b1220;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid #1f2937;
    font-size: 13px;
}

tr:hover {
    background: #0f172a;
}

.up { color: #22c55e; }
.down { color: #ef4444; }
.flat { color: #facc15; }

#preview {
    position: fixed;
    right: 20px;
    top: 80px;
    width: 260px;
    background: #0b1220;
    border: 1px solid #1f2937;
    padding: 10px;
    font-size: 12px;
    display: none;
}
</style>
</head>

<body>

<script>
/* =========================
   MAINTENANCE MODE (BLOCKS EVERYTHING)
========================= */
const MAINTENANCE_MODE = false; // 🔴 set TRUE to lock site

if (MAINTENANCE_MODE) {
    document.open();
    document.write(`
        <html>
        <head>
            <title>Maintenance</title>
            <style>
                body{
                    margin:0;
                    height:100vh;
                    display:flex;
                    justify-content:center;
                    align-items:center;
                    background:#070a0f;
                    color:white;
                    font-family:Arial;
                    font-size:40px;
                    font-weight:bold;
                }
            </style>
        </head>
        <body>
            Currently Down for Maintenance
        </body>
        </html>
    `);
    document.close();
}
</script>

<div class="topbar">
    <div>WILD WEST MARKET TERMINAL</div>
    <div>● DATABASE ACTIVE</div>
</div>

<div class="wrapper">

<div class="sidebar">
    <div class="tab active">AUCTION HOUSE</div>
    <div class="tab">EVENT ITEMS</div>
    <div class="tab">ABOUT</div>
</div>

<div class="main">
<input class="search" placeholder="SEARCH ITEMS...">

<table>
<thead>
<tr>
<th>ITEM</th>
<th>TYPE</th>
<th>PRICE</th>
<th>BID</th>
<th>TREND</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

</div>

<div id="preview"></div>

<script>
// (your existing JS can go here later)
</script>

</body>
</html>
